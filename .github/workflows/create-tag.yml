name: Crear tags de version

on:
  push:
    branches: [main]
    paths: [".github/release-tags.json"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const wanted = JSON.parse(fs.readFileSync(".github/release-tags.json", "utf8"));
            for (const { tag, sha, message } of wanted) {
              try {
                await github.rest.git.getRef({ ...context.repo, ref: `tags/${tag}` });
                core.info(`El tag ${tag} ya existe; lo salto.`);
                continue;
              } catch (e) { /* no existe: lo creamos */ }
              const tagObj = await github.rest.git.createTag({
                ...context.repo, tag, message: message || tag, object: sha, type: "commit",
              });
              await github.rest.git.createRef({
                ...context.repo, ref: `refs/tags/${tag}`, sha: tagObj.data.sha,
              });
              core.info(`Tag ${tag} creado sobre ${sha}.`);
            }
