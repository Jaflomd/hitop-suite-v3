{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HiTOP Paciente</title>
<link rel="stylesheet" href="{% static 'clinical/webapp.css' %}">
</head>
<body>
<header><strong>HiTOP</strong><span>Paciente</span><button id="logoutBtn" class="ghost hidden">Salir</button></header>
<main>
  <section id="loginView" class="center-card">
    <form id="loginForm" class="card">
      {% csrf_token %}
      <h1>Ingreso paciente</h1>
      <p class="muted">Yachay</p>
      <label>Codigo HCL/Yachay<input id="hclCode" autocomplete="username"></label>
      <label>DNI<input id="dni" type="password" inputmode="numeric" autocomplete="current-password"></label>
      <button type="submit">Entrar</button>
      <p id="loginErr" class="err"></p>
    </form>
  </section>

  <section id="appView" class="hidden">
    <div class="grid two">
      <section class="card">
        <h2>Paciente</h2>
        <div class="metric"><span>Codigo interno</span><strong id="subjectId">s/d</strong></div>
        <div class="metric"><span>Asignaciones</span><strong id="assignmentCount">0</strong></div>
      </section>
      <section class="card">
        <h2>Bateria</h2>
        <select id="assignmentSel"></select>
        <div class="progress"><i id="progressBar"></i></div>
        <p id="progressText" class="muted">s/d</p>
      </section>
    </div>

    <section id="dimensionMap"></section>

    <section id="scaleCard" class="card">
      <h2 id="scaleTitle">Escala</h2>
      <p id="scaleInstr" class="muted"></p>
      <div id="items"></div>
      <div class="actions">
        <button id="saveScaleBtn">Guardar escala</button>
        <button id="refreshBtn" class="ghost">Actualizar</button>
      </div>
      <p id="scaleMsg" class="muted"></p>
    </section>

    <section class="card">
      <h2>Resultados registrados</h2>
      <div id="resultsList" class="list"></div>
    </section>
  </section>
</main>
<script src="{% static 'clinical/scale_catalog.js' %}"></script>
<script src="{% static 'clinical/dimensional_map.js' %}"></script>
<script>
const state={patient:null,assignments:[],assignment:null,results:[],currentScale:null};
function csrfToken(){const m=document.cookie.match(/(?:^|; )csrftoken=([^;]+)/);return m?decodeURIComponent(m[1]):document.querySelector("[name=csrfmiddlewaretoken]").value;}
async function api(path,opts={}){const method=opts.method||"GET";const res=await fetch(path,{credentials:"same-origin",headers:{"Content-Type":"application/json",...(method==="GET"?{}:{"X-CSRFToken":csrfToken()}),...(opts.headers||{})},...opts});const data=await res.json();if(!res.ok||data.ok===false)throw new Error(data.error||"Error");return data;}
function showApp(){loginView.classList.add("hidden");appView.classList.remove("hidden");logoutBtn.classList.remove("hidden");}
function showLogin(){loginView.classList.remove("hidden");appView.classList.add("hidden");logoutBtn.classList.add("hidden");}
function selectedAssignment(){return state.assignments.find(a=>String(a.id)===assignmentSel.value)||state.assignments[0]||null;}
function upsertAssignment(assignment){
  if(!assignment)return;
  const idx=state.assignments.findIndex(a=>a.id===assignment.id);
  if(idx>=0)state.assignments[idx]=assignment;else state.assignments.unshift(assignment);
  state.assignment=assignment;
}
function scaleFromId(scaleId){
  const scale=(state.assignment&&state.assignment.scales||[]).find(s=>s.scale_id===scaleId);
  return scale?{scale_id:scale.scale_id,scale_label:scale.scale_label}:null;
}
function renderAssignments(){
  subjectId.textContent=state.patient?state.patient.subject_id:"s/d";
  assignmentCount.textContent=state.assignments.length;
  assignmentSel.innerHTML=state.assignments.map(a=>`<option value="${a.id}">${a.template_name} · ${a.progress.done}/${a.progress.total}</option>`).join("");
  if(state.assignment)assignmentSel.value=state.assignment.id;
  state.assignment=selectedAssignment();
  renderProgress();
  renderDimensionalView();
}
function renderProgress(){
  const a=state.assignment;if(!a){progressBar.style.width="0%";progressText.textContent="Sin bateria asignada.";return;}
  progressBar.style.width=a.progress.percent+"%";
  progressText.textContent=`${a.progress.done}/${a.progress.total} escalas · ${a.status}`;
}
function renderDimensionalView(){
  HITOP_RENDER_DIMENSIONAL_MAP(dimensionMap,{assignment:state.assignment,results:state.results,selectedScaleId:state.currentScale&&state.currentScale.scale_id,mode:"patient",onSelectScale:(scaleId)=>{const scale=scaleFromId(scaleId);if(scale){state.currentScale=scale;renderScale();renderDimensionalView();}},onPrimaryAction:(scaleId)=>{const scale=scaleFromId(scaleId);if(scale){state.currentScale=scale;renderScale();renderDimensionalView();scaleCard.scrollIntoView({behavior:"smooth",block:"start"});}}});
}
async function loadAssignments(){
  const data=await api("/api/patient/assignments/");
  state.assignments=data.assignments||[];
  renderAssignments();
  await loadNext();
  await loadResults();
}
async function loadNext(){
  state.assignment=selectedAssignment();
  if(!state.assignment){scaleTitle.textContent="Sin bateria";items.innerHTML="";return;}
  const data=await api(`/api/patient/assignments/${state.assignment.id}/next/`);
  upsertAssignment(data.assignment);
  state.currentScale=data.next_scale;
  renderAssignments();
  renderScale();
}
async function loadResults(){
  if(!state.assignment){resultsList.innerHTML="";return;}
  const data=await api(`/api/patient/assignments/${state.assignment.id}/results/`);
  state.results=data.results||[];
  resultsList.innerHTML=state.results.length?state.results.map(r=>`<div class="row"><strong>${r.scale_label}</strong><span>${r.raw_value}/${r.max_value} · ${r.percentile}/100</span></div>`).join(""):"<p class='muted'>Sin resultados registrados.</p>";
  renderDimensionalView();
}
function renderScale(){
  scaleMsg.textContent="";
  renderDimensionalView();
  if(!state.currentScale){scaleTitle.textContent="Bateria completa";scaleInstr.textContent="Devuelve la tablet al equipo.";items.innerHTML="";saveScaleBtn.disabled=true;return;}
  const scale=HITOP_SCALE_CATALOG[state.currentScale.scale_id];
  saveScaleBtn.disabled=false;
  scaleTitle.textContent=scale?scale.label:state.currentScale.scale_label;
  scaleInstr.textContent="Responde todos los items.";
  items.innerHTML=(scale.items||[]).map((item,i)=>`<fieldset class="item"><legend>${i+1}. ${item}</legend>${scale.opts.map((o,v)=>`<label class="opt"><input type="radio" name="q${i}" value="${v}"> ${o}</label>`).join("")}</fieldset>`).join("");
}
async function saveScale(){
  const scale=HITOP_SCALE_CATALOG[state.currentScale.scale_id]; if(!scale)return;
  const answers=scale.items.map((_,i)=>{const el=document.querySelector(`input[name=q${i}]:checked`);return el?Number(el.value):null;});
  if(answers.some(v=>v===null)){scaleMsg.textContent="Faltan items por responder.";return;}
  const scored=HITOP_SCORE_SCALE(scale,answers);
  const data=await api(`/api/patient/assignments/${state.assignment.id}/results/`,{method:"POST",body:JSON.stringify(scored)});
  upsertAssignment(data.assignment);
  scaleMsg.textContent="Guardado.";
  await loadNext();
  await loadResults();
}
async function boot(){
  await api("/api/auth/csrf/");
  const urlToken=new URLSearchParams(location.search).get("token");
  if(urlToken){const data=await api("/api/patient/auth/token-login/",{method:"POST",body:JSON.stringify({token:urlToken})});state.patient=data.patient;state.assignments=[data.assignment];showApp();renderAssignments();await loadNext();await loadResults();return;}
  const me=await api("/api/patient/auth/me/");
  if(me.authenticated){state.patient=me.patient;showApp();await loadAssignments();}else showLogin();
}
loginForm.onsubmit=async e=>{e.preventDefault();loginErr.textContent="";try{const data=await api("/api/patient/auth/login/",{method:"POST",body:JSON.stringify({hcl_code:hclCode.value,dni:dni.value})});state.patient=data.patient;showApp();await loadAssignments();}catch(ex){loginErr.textContent=ex.message;}};
assignmentSel.onchange=async()=>{state.assignment=selectedAssignment();await loadNext();await loadResults();};
saveScaleBtn.onclick=saveScale;refreshBtn.onclick=loadAssignments;
logoutBtn.onclick=async()=>{await api("/api/patient/auth/logout/",{method:"POST",body:"{}"});showLogin();};
boot().catch(()=>showLogin());
</script>
</body>
</html>
