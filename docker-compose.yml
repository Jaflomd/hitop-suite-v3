services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-hitop}
      POSTGRES_USER: ${POSTGRES_USER:-hitop}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hitop_local_only_change_me}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hitop} -d ${POSTGRES_DB:-hitop}"]
      interval: 5s
      timeout: 5s
      retries: 12
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"

  web:
    build:
      context: ./backend
    command: python manage.py runserver 0.0.0.0:8000
    environment:
      DJANGO_DEBUG: "1"
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-local-dev-insecure-change-me}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1}
      POSTGRES_DB: ${POSTGRES_DB:-hitop}
      POSTGRES_USER: ${POSTGRES_USER:-hitop}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hitop_local_only_change_me}
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      FIELD_ENCRYPTION_KEY: ${FIELD_ENCRYPTION_KEY:-}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - ./backups:/backups
    ports:
      - "127.0.0.1:8000:8000"

volumes:
  postgres_data:
